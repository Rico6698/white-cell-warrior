function startBattle(monster,map){
  Logger.trace('startBattle',{q:monster.qIndex+1,region:S.currentRegion});
  playSound('encounter');
  S.screen='battle';
  const q=S.regionQuestions[monster.qIndex];
  // Shuffle options
  const indices=[0,1,2,3];for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]]}
  const shuffledOpts=indices.map(i=>q.o[i]);
  const newCorrect=indices.indexOf(q.c);
  S.battleData={monster,map,q:{m:q.m,q:q.q,o:shuffledOpts,c:newCorrect,e:q.e,s:q.s},answered:false};

  document.getElementById('battleOverlay').classList.add('active');
  document.getElementById('battleEmoji').textContent='👾';
  document.getElementById('battleMonsterName').textContent=`误区病毒 #${monster.qIndex+1}`;
  document.getElementById('battleProgress').textContent=`本关进度：${S.qIndex} / ${S.regionQuestions.length}`;
  document.getElementById('battleMisconception').textContent=`⚠️ 误区：${q.m}`;
  document.getElementById('battlePrompt').textContent=q.q;

  const od=document.getElementById('battleOptions');od.innerHTML='';
  shuffledOpts.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='battle-option';btn.textContent=`${['A','B','C','D'][i]}. ${opt}`;
    btn.onclick=()=>handleAnswer(i);od.appendChild(btn);
  });
  document.getElementById('battleResult').classList.remove('show','cr','wr');
  document.getElementById('resultBtn').style.display='none';
  // GSAP entrance
  gsap.from('#battleEmoji',{scale:0,rotation:-30,duration:.5,ease:'back.out(2)'});
  gsap.from('#battleMonsterName',{y:20,opacity:0,duration:.4,delay:.2});
}

function handleAnswer(idx){
  if(S.battleData.answered)return;S.battleData.answered=true;
  const data=S.battleData,correct=data.q.c;
  document.querySelectorAll('.battle-option').forEach((opt,i)=>{opt.classList.add('disabled');if(i===correct)opt.classList.add('correct');if(i===idx&&idx!==correct)opt.classList.add('wrong')});
  const rd=document.getElementById('battleResult'),rt=document.getElementById('resultTitle'),re=document.getElementById('resultExplain'),rb=document.getElementById('resultBtn');
  if(idx===correct){S.correctCount++;Logger.trace('handleAnswer','✅ 正确');playSound('correct');rd.className='battle-result show cr';rt.textContent='✅ 正确！误区病毒被消灭！'}
  else{S.wrongCount++;Logger.warn('handleAnswer','❌ 错误',{hp:S.player.hp-20,region:S.currentRegion});S.player.hp=Math.max(0,S.player.hp-20);playSound('wrong');rd.className='battle-result show wr';rt.textContent='❌ 错误！你受到了误区伤害！';rb.textContent='➡️ 继续'}
  re.innerHTML=`<strong>📖 科学解读：</strong>${data.q.e}<br><br><em>来源：${data.q.s}</em>`;
  rb.style.display='inline-block';rb.textContent=idx===correct?'🎉 继续':'➡️ 继续';
  setTimeout(function(){rb.scrollIntoView({behavior:'smooth',block:'center'})},100);
  updateHUD();
}

function battleContinue(){
  const data=S.battleData;
  // Defeat monster
  defeatMonster(data.monster);
  endBattle();
}

function defeatMonster(monster){
  Logger.trace('defeatMonster',{q:monster.qIndex+1,score:S.player.score+100,lv:S.player.level});
  playSound('defeat');
  const key=`${S.currentWorld}_${S.currentRegion}_${monster.qIndex}`;
  S.monstersDefeated[key]=true;
  const map=S.currentMap,idx=map.monsters.indexOf(monster);
  if(idx>-1)map.monsters.splice(idx,1);
  S.player.score+=100;S.player.xp+=30;S.qIndex++;
  checkLevelUp();
  for(let i=0;i<30;i++){const colors=['#ffd166','#06d6a0','#00b4d8','#f0f0f0'];S.particles.push({x:S.player.x,y:S.player.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,size:2+Math.random()*4,life:1,decay:.015,color:colors[Math.floor(Math.random()*4)]})}
  S.damageNumbers.push({x:S.player.x,y:S.player.y-20,text:'+100 ⭐',color:'#ffd166',size:18,life:1});
  updateHUD();
  if(map.monsters.length===0){S.regionsCleared[`${S.currentWorld}_${S.currentRegion}`]=true;showSummaryCard()}
}

function showSummaryCard(){
  Logger.trace('showSummaryCard',{correct:S.correctCount,wrong:S.wrongCount,total:S.regionQuestions.length});
  const total=S.regionQuestions.length;
  const score=S.correctCount*100;
  document.getElementById('scCorrect').textContent=S.correctCount;
  document.getElementById('scWrong').textContent=S.wrongCount;
  document.getElementById('scTotal').textContent=total;
  document.getElementById('scScore').textContent=score+' ⭐';
  if(S.wrongCount===0)document.getElementById('scTitle').textContent='🏆 完美通关！';
  else if(S.correctCount>=total*0.8)document.getElementById('scTitle').textContent='🎊 区域通关！';
  else document.getElementById('scTitle').textContent='✅ 区域完成';
  document.getElementById('summaryCard').classList.add('active');
  // GSAP entrance
  gsap.from('.sc-box',{scale:.5,opacity:0,duration:.5,ease:'back.out(1.5)'});
  gsap.from('.sc-stat-val',{y:30,opacity:0,stagger:.15,duration:.4,delay:.3,ease:'power2.out'});
  gsap.from('.sc-score-val',{scale:0,duration:.4,delay:.6,ease:'elastic.out(1,0.5)'});
}

function closeSummaryCard(){
  document.getElementById('summaryCard').classList.remove('active');
  exitRegion();
}

function endBattle(){
  document.getElementById('battleOverlay').classList.remove('active');S.screen='exploring';S.battleData=null;updateHUD();
  // Check win
  const world=WORLDS[S.currentWorld];
  const allCleared=world.regions.every(rid=>S.regionsCleared[`${S.currentWorld}_${rid}`]);
  if(allCleared){if(S.currentWorld<WORLDS.length-1){showDialog(`🎉 "${world.name}" 全部通关！\n\n新的世界已解锁！按ESC查看世界地图。`)}else{setTimeout(showWinScreen,500)}}
}

function checkLevelUp(){
  const p=S.player;
  while(p.xp>=p.maxXp){p.xp-=p.maxXp;p.level++;p.maxXp=Math.floor(p.maxXp*1.5);p.maxHp+=20;p.hp=p.maxHp;p.speed=Math.min(5,p.speed+.2);Logger.trace('checkLevelUp','⬆️ 升级',{lv:p.level,maxHp:p.maxHp,speed:p.speed.toFixed(1)});playSound('levelup');S.damageNumbers.push({x:p.x,y:p.y-40,text:`⬆️ Lv.${p.level}!`,color:'#06d6a0',size:22,life:1})}
}

// ============================
// WORLD MAP
// ============================
function openWorldMap(){
  S.screen='worldmap';
  document.getElementById('worldMap').classList.add('active');
  const container=document.getElementById('worldContent');container.innerHTML='';
  WORLDS.forEach((world,wi)=>{
    const worldDiv=document.createElement('div');worldDiv.className='wm-world';
    const isUnlocked=true;
    worldDiv.innerHTML=`<div class="wm-world-name">${world.name}${isUnlocked?'':' 🔒'}</div>`;
    const regDiv=document.createElement('div');regDiv.className='wm-regions';
    world.regions.forEach((rid)=>{
      const r=REGIONS[rid];const cleared=S.regionsCleared[`${wi}_${rid}`];
      const qs=Q[rid]||[];const defeatedCount=qs.filter((_,i)=>S.monstersDefeated[`${wi}_${rid}_${i}`]).length;
      const card=document.createElement('div');card.className=`wr-card ${!isUnlocked?'locked':''} ${cleared?'cleared':''}`;
      card.innerHTML=`${!isUnlocked?'<div class="rl">🔒</div>':''}<div class="ri">${r.icon}</div><div class="rn">${r.name}</div><div class="rp">${cleared?'✅ 已清除':`${defeatedCount}/${qs.length}`}</div>`;
      if(isUnlocked&&!cleared)card.onclick=()=>enterRegion(wi,rid);
      regDiv.appendChild(card);
    });
    worldDiv.appendChild(regDiv);container.appendChild(worldDiv);
  });
}
function closeWorldMap(){if(S.currentRegion!==null){S.screen='exploring';document.getElementById('worldMap').classList.remove('active')}}

function enterRegion(worldIdx,regionId){
  Logger.trace('enterRegion',{world:WORLDS[worldIdx].name,region:REGIONS[regionId].name});
  S.currentWorld=worldIdx;S.currentRegion=regionId;S.qIndex=0;S.correctCount=0;S.wrongCount=0;
  S.regionQuestions=shuffle(Q[regionId]||[]);
  S.currentMap=genMap(regionId);
  S.player.x=S.currentMap.mapW/2;S.player.y=S.currentMap.mapH-100;
  document.getElementById('worldMap').classList.remove('active');
  document.getElementById('hud').style.display='flex';
  document.getElementById('minimap').style.display='block';
  const mmb=document.getElementById('mobileMapBtn');if(mmb)mmb.style.display='block';
  const region=REGIONS[regionId];
  showTransition(region.name,WORLDS[worldIdx].name,()=>{
    S.screen='exploring';
    if(S.currentMap.monsters.length>0)showDialog(`🦠 检测到 ${S.currentMap.monsters.length} 个误区病毒！\n\n走近它们，用你的医学知识打败它们！\n\n移动：WASD / 方向键 / 手机摇杆`);
    else showSummaryCard();
    updateHUD();
  });
}
function exitRegion(){Logger.trace('exitRegion','区域通关');S.currentRegion=null;S.currentMap=null;document.getElementById('hud').style.display='none';document.getElementById('minimap').style.display='none';const mmb=document.getElementById('mobileMapBtn');if(mmb)mmb.style.display='none';openWorldMap()}

// ============================
// UI HELPERS
// ============================
function updateHUD(){
  const p=S.player;
  document.getElementById('hpFill').style.width=`${(p.hp/p.maxHp)*100}%`;
  document.getElementById('hpText').textContent=`${p.hp}/${p.maxHp}`;
  document.getElementById('levelText').textContent=`Lv.${p.level}`;
  document.getElementById('xpFill').style.width=`${(p.xp/p.maxXp)*100}%`;
  document.getElementById('scoreText').textContent=`⭐ ${p.score}`;
  if(S.currentRegion){const r=REGIONS[S.currentRegion];document.getElementById('regionText').textContent=r?r.name:''}
}
function showDialog(text){S.screen='dialog';const box=document.getElementById('dialogBox');box.classList.add('active');document.getElementById('dialogText').textContent=text}
function hideDialog(){document.getElementById('dialogBox').classList.remove('active');if(S.currentRegion)S.screen='exploring'}
function showTransition(sub,main,cb){S.screen='transition';const el=document.getElementById('transition');el.classList.add('active');document.getElementById('transText').textContent=main;document.getElementById('transSub').textContent=sub;setTimeout(()=>{el.classList.remove('active');if(cb)cb()},2000)}
function showWinScreen(){S.screen='win';document.getElementById('winScreen').classList.add('active');const p=S.player;document.getElementById('winStats').innerHTML=`最终等级：Lv.${p.level}<br>消灭误区：${Object.keys(S.monstersDefeated).length}<br>总得分：${p.score}`}
function showControls(){const el=document.getElementById('controlsInfo');el.style.display=el.style.display==='none'?'block':'none'}

// ============================
// INPUT
// ============================
document.addEventListener('keydown',e=>{S.keys[e.key]=true;if(e.key==='Escape'){if(S.screen==='exploring')openWorldMap();else if(S.screen==='worldmap'&&S.currentRegion!==null)closeWorldMap()}if(e.key===' '||e.key==='Enter'){if(S.screen==='dialog')hideDialog()}});
document.addEventListener('keyup',e=>{S.keys[e.key]=false});
document.getElementById('dialogBox').addEventListener('click',hideDialog);
document.querySelectorAll('.dpad-btn').forEach(btn=>{const dir=btn.dataset.dir,setD=active=>{if(dir==='up')S.touchDir.y=active?-1:0;if(dir==='down')S.touchDir.y=active?1:0;if(dir==='left')S.touchDir.x=active?-1:0;if(dir==='right')S.touchDir.x=active?1:0};btn.addEventListener('touchstart',e=>{e.preventDefault();setD(true)});btn.addEventListener('touchend',e=>{e.preventDefault();setD(false)});btn.addEventListener('mousedown',()=>setD(true));btn.addEventListener('mouseup',()=>setD(false));btn.addEventListener('mouseleave',()=>setD(false))});

// ============================
// TITLE CELLS
// ============================
function createTitleCells(){const c=document.getElementById('titleCells');for(let i=0;i<20;i++){const cell=document.createElement('div');cell.className='fc';const sz=20+Math.random()*60;cell.style.width=sz+'px';cell.style.height=sz+'px';cell.style.left=Math.random()*100+'%';cell.style.background=['#00b4d8','#e63946','#06d6a0','#ffd166','#9b59b6'][Math.floor(Math.random()*5)];cell.style.animationDuration=(8+Math.random()*15)+'s';cell.style.animationDelay=Math.random()*10+'s';c.appendChild(cell)}}

// ============================
// GAME LOOP
// ============================
function gameLoop(){
  const _t0=performance.now();
  try{
    Logger.tick();
    if(S.currentMap){if(S.screen==='exploring')update();drawMap(S.currentMap);if(S.animFrame%3===0)drawMinimap(S.currentMap)}
    else{ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W(),H())}
    const _t1=performance.now();if(_t1-_t0>16)Logger.perf('gameLoop 慢帧',_t1-_t0);
  }catch(e){Logger.error('gameLoop 异常',e);ctx.fillStyle='#e63946';ctx.font='16px sans-serif';ctx.fillText('Error: '+e.message,20,40);console.error('Game loop error:',e)}
  requestAnimationFrame(gameLoop);
}

// ============================
// START
// ============================
function startGame(){Logger.init();Logger.info('startGame','游戏启动');initAudio();startBGM();gsap.to('#titleScreen',{opacity:0,duration:.6,ease:'power2.in',onComplete:()=>{document.getElementById('titleScreen').style.display='none';openWorldMap();gameLoop()}})}
createTitleCells();
// Title pulse with GSAP
gsap.to('#titleScreen h1',{scale:1.03,duration:1.5,ease:'sine.inOut',yoyo:true,repeat:-1});

// ============================
// MOBILE ORIENTATION LOCK
// ============================
(function(){
  const isMobile=/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
  if(!isMobile)return;
  // Try screen.orientation.lock
  if(screen.orientation&&screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
  // Also listen for orientation changes and re-lock
  window.addEventListener('orientationchange',()=>{
    if(screen.orientation&&screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{});
    }
  });
  // Resize minimap canvas on mobile
  function resizeMinimapForMobile(){
    const mc=document.getElementById('minimapCanvas');
    const mm=document.getElementById('minimap');
    if(!mc||!mm)return;
    if(window.innerHeight<500){
      const s=window.innerHeight<400?70:90;
      mc.width=s;mc.height=s;
      mm.style.width=s+'px';mm.style.height=s+'px';
    }else{
      mc.width=160;mc.height=160;
      mm.style.width='160px';mm.style.height='160px';
    }
  }
  window.addEventListener('resize',resizeMinimapForMobile);
  resizeMinimapForMobile();
})();
</script>
</body>
</html>
